<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPI Finder</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0f1e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #f1f5f9; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(71,85,105,0.4); border-radius: 3px; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* Header */
  #app-header {
    position: sticky; top: 0; z-index: 40;
    background: rgba(10,15,30,0.97);
    border-bottom: 1px solid rgba(51,65,85,0.35);
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto; padding: 0 24px;
    height: 56px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text { font-weight: 700; color: #f1f5f9; font-size: 14px; }
  .header-actions { display: flex; align-items: center; gap: 6px; }
  .compare-nav-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
    border: 1px solid; transition: all 0.15s;
  }
  .compare-nav-btn.has-items {
    background: rgba(109,40,217,0.15); border-color: rgba(139,92,246,0.4); color: #c4b5fd; cursor: pointer;
  }
  .compare-nav-btn.empty {
    background: rgba(30,41,59,0.4); border-color: rgba(71,85,105,0.3); color: #475569; cursor: not-allowed;
  }
  .compare-count {
    width: 18px; height: 18px; border-radius: 50%; background: #7c3aed;
    color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .compare-clear-btn {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px;
    border: 1px solid rgba(139,92,246,0.3); cursor: pointer; transition: all 0.15s;
    background: rgba(109,40,217,0.1); color: #94a3b8;
  }
  .compare-clear-btn:hover {
    background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #fca5a5;
  }

  /* Filters */
  #filter-section { border-bottom: 1px solid rgba(51,65,85,0.2); padding-bottom: 32px; }
  .filter-inner {
    max-width: 1100px; margin: 0 auto; padding: 40px 24px 0;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .hero-title { font-size: 26px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; text-align: center; }
  .hero-sub { font-size: 13px; color: #64748b; text-align: center; }
  .mode-toggle {
    display: flex; background: rgba(15,23,42,0.8);
    border: 1px solid rgba(51,65,85,0.4); border-radius: 10px; padding: 4px; gap: 4px;
  }
  .mode-btn {
    padding: 7px 20px; border-radius: 7px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
  }
  .mode-btn.active { background: rgba(99,102,241,0.2); color: #a5b4fc; border-color: rgba(99,102,241,0.35); }
  .mode-btn.inactive { background: transparent; color: #64748b; }

  /* Search */
  #search-section { position: relative; width: 100%; max-width: 500px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; }
  #search-input {
    width: 100%; padding: 11px 16px 11px 42px; border-radius: 10px; font-size: 13px;
    outline: none; background: rgba(15,23,42,0.8);
    border: 1px solid rgba(71,85,105,0.5); color: #e2e8f0;
  }
  #search-input::placeholder { color: #475569; }

  /* Tag filters */
  #tags-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .filter-group-label {
    font-size: 11px; font-weight: 600; color: #475569;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; text-align: center;
  }
  .pills-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; border: 1px solid;
  }
  .filter-pill.active { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.5); color: #a5b4fc; }
  .filter-pill.inactive { background: rgba(15,23,42,0.6); border-color: rgba(71,85,105,0.35); color: #64748b; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .focus-toggle-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: #64748b; background: none; border: none; cursor: pointer; transition: color 0.15s;
  }
  .focus-toggle-btn:hover { color: #94a3b8; }
  .focus-toggle-arrow { transition: transform 0.2s; }
  .focus-count-badge {
    padding: 1px 7px; border-radius: 6px;
    background: rgba(109,40,217,0.2); color: #c4b5fd; font-size: 11px; font-weight: 600;
  }
  #tags-panel { text-align: center; }
  .tag-pill-focus {
    padding: 6px 14px; border-radius: 8px; font-size: 13px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; border: 1px solid;
  }
  .tag-pill-focus.active { background: rgba(109,40,217,0.15); border-color: rgba(139,92,246,0.45); color: #c4b5fd; }
  .tag-pill-focus.inactive { background: rgba(15,23,42,0.6); border-color: rgba(71,85,105,0.35); color: #64748b; }
  .clear-filters-btn {
    font-size: 12px; color: #475569; background: none; border: none; cursor: pointer;
  }
  .clear-filters-btn:hover { color: #94a3b8; }

  /* Results */
  #results-section { max-width: 1100px; margin: 0 auto; padding: 28px 24px 48px; }
  .results-count { font-size: 13px; color: #64748b; margin-bottom: 20px; }
  .results-count strong { color: #e2e8f0; font-weight: 600; }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding-top: 80px; text-align: center;
  }
  .empty-icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: rgba(15,23,42,0.6); border: 1px solid rgba(71,85,105,0.3);
    display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
  }
  .empty-text { color: #64748b; font-size: 14px; }
  .try-again-btn {
    margin-top: 8px; font-size: 13px; color: #818cf8;
    background: none; border: none; cursor: pointer;
  }

  /* KPI Card */
  .kpi-card {
    display: flex; flex-direction: column; border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(51,65,85,0.4); background: rgba(15,23,42,0.6);
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .kpi-card:hover { border-color: rgba(71,85,105,0.65); background: rgba(15,23,42,0.85); }
  .kpi-card.comparing { border-color: rgba(139,92,246,0.5); background: rgba(109,40,217,0.07); }
  .kpi-card.comparing:hover { border-color: rgba(139,92,246,0.5); background: rgba(109,40,217,0.07); }
  .card-accent { height: 3px; opacity: 0.7; }
  .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .card-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 14px; font-weight: 600; color: #f1f5f9; line-height: 1.4; flex: 1; }
  .type-badge { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .card-category { display: flex; align-items: center; gap: 6px; }
  .cat-link {
    font-size: 12px; font-weight: 500; background: none; border: none; cursor: pointer; padding: 0;
    text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px;
  }
  .card-desc {
    font-size: 12px; color: #94a3b8; line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .chart-rec {
    display: flex; align-items: center; gap: 10px;
    background: rgba(8,15,35,0.6); border: 1px solid rgba(51,65,85,0.3);
    border-radius: 8px; padding: 8px 12px;
  }
  .chart-rec-icon { font-size: 16px; flex-shrink: 0; }
  .chart-rec-label { font-size: 10px; color: #475569; margin: 0 0 2px; font-weight: 500; }
  .chart-rec-type { font-size: 12px; font-weight: 600; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-pill-card {
    padding: 3px 9px; border-radius: 6px; font-size: 11px; cursor: pointer;
    transition: all 0.15s; border: 1px solid; background: none;
  }
  .tag-pill-card.active { background: rgba(109,40,217,0.3); border-color: rgba(139,92,246,0.6); color: #e9d5ff; font-weight: 600; }
  .tag-pill-card.inactive { background: rgba(109,40,217,0.1); border-color: rgba(139,92,246,0.2); color: #a78bfa; }
  .card-footer { padding: 0 16px 14px; display: flex; gap: 8px; }
  .card-compare-btn {
    flex: 1; padding: 6px 0; border-radius: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; border: 1px solid;
  }
  .card-compare-btn.active { background: rgba(109,40,217,0.2); border-color: rgba(139,92,246,0.45); color: #c4b5fd; }
  .card-compare-btn.inactive { background: rgba(15,23,42,0.8); border-color: rgba(51,65,85,0.35); color: #64748b; }
  .card-calc-btn {
    padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0; border: 1px solid;
  }

  /* Modals */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    background: rgba(0,0,10,0.72); backdrop-filter: blur(6px);
  }
  .modal-overlay.top-align { align-items: flex-start; padding: 48px 24px; overflow-y: auto; }
  .modal-box {
    position: relative; width: 100%; border-radius: 16px;
    border: 1px solid rgba(51,65,85,0.6); background: #0d1526;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; max-height: 88vh; overflow: hidden;
  }
  .modal-accent { height: 3px; flex-shrink: 0; }
  .modal-header {
    padding: 24px 28px 20px; flex-shrink: 0;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .modal-header-compact { padding: 20px 24px 16px; }
  .modal-title { font-size: 22px; font-weight: 700; color: #f1f5f9; line-height: 1.3; }
  .modal-divider { height: 1px; background: rgba(51,65,85,0.4); flex-shrink: 0; }
  .modal-body { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 24px; }
  .modal-body-compact { padding: 20px 24px; gap: 18px; }
  .modal-footer {
    padding: 16px 28px 24px; border-top: 1px solid rgba(51,65,85,0.35);
    flex-shrink: 0; display: flex; gap: 10px;
  }
  .modal-footer-compact { padding: 14px 24px 20px; }
  .close-btn {
    padding: 6px; border-radius: 8px; background: none; border: none;
    color: #475569; cursor: pointer; flex-shrink: 0; font-size: 16px; line-height: 1;
  }
  .close-btn:hover { color: #94a3b8; }
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #475569; margin-bottom: 8px;
  }
  .chart-rec-box {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(8,15,35,0.6); border: 1px solid rgba(51,65,85,0.35);
    border-radius: 10px; padding: 14px 16px;
  }
  .focus-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .focus-pill {
    padding: 5px 12px; border-radius: 7px; font-size: 12px; cursor: pointer;
    background: rgba(109,40,217,0.12); border: 1px solid rgba(139,92,246,0.25); color: #c4b5fd;
    transition: all 0.15s;
  }
  .focus-pill:hover { background: rgba(109,40,217,0.25); border-color: rgba(139,92,246,0.5); }
  .var-pill {
    padding: 5px 12px; border-radius: 7px; font-size: 12px;
    background: rgba(15,23,42,0.8); border: 1px solid rgba(51,65,85,0.4); color: #64748b;
  }
  .detail-compare-btn {
    flex: 1; padding: 11px 0; border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: 1px solid rgba(139,92,246,0.4); color: #c4b5fd;
  }
  .detail-compare-btn.active { background: rgba(109,40,217,0.25); }
  .detail-compare-btn.inactive { background: rgba(109,40,217,0.15); }
  .detail-calc-btn {
    padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0; border: 1px solid;
  }

  /* Compare table */
  .compare-box { max-width: 900px; max-height: none; overflow: hidden; }
  .compare-table { width: 100%; border-collapse: collapse; }
  .compare-label-th { padding: 20px; border-bottom: 1px solid rgba(51,65,85,0.35); background: rgba(8,15,35,0.4); }
  .compare-kpi-th {
    padding: 20px 24px; border-bottom: 1px solid rgba(51,65,85,0.35);
    border-left: 1px solid rgba(51,65,85,0.35); background: rgba(8,15,35,0.4);
    text-align: left; vertical-align: top;
  }
  .compare-label-td {
    padding: 20px; border-bottom: 1px solid rgba(51,65,85,0.35);
    font-size: 11px; font-weight: 600; color: #475569;
    text-transform: uppercase; letter-spacing: 0.08em; vertical-align: middle;
  }
  .compare-label-td.top { vertical-align: top; padding-top: 22px; }
  .compare-cell {
    padding: 20px 24px; border-bottom: 1px solid rgba(51,65,85,0.35);
    border-left: 1px solid rgba(51,65,85,0.35); vertical-align: middle;
  }
  .compare-cell.top { vertical-align: top; }
  .compare-cell.last { border-bottom: none; }
  .compare-label-td.last { border-bottom: none; }
  .remove-compare-btn {
    background: none; border: none; color: #334155; cursor: pointer;
    padding: 2px; flex-shrink: 0; font-size: 14px; line-height: 1;
  }
  .remove-compare-btn:hover { color: #64748b; }

  /* Calculator */
  .formula-box {
    background: rgba(8,15,35,0.8); border: 1px solid; border-radius: 10px; padding: 14px 16px;
  }
  .formula-text {
    font-size: 13px; margin: 0; line-height: 1.65;
    font-family: 'Courier New', Courier, monospace; font-weight: 500;
  }
  .calc-input {
    width: 100%; padding: 9px 12px; border-radius: 8px; font-size: 13px;
    background: rgba(15,23,42,0.9); border: 1px solid; color: #e2e8f0;
    outline: none; transition: border-color 0.15s; font-family: inherit;
  }
  .calc-error {
    font-size: 12px; color: #f87171; padding: 8px 12px;
    background: rgba(239,68,68,0.08); border-radius: 8px; border: 1px solid rgba(239,68,68,0.2);
  }
  .calc-result-box { border-radius: 10px; padding: 16px; text-align: center; }
  .calc-result-value { font-weight: 700; line-height: 1.25; letter-spacing: -0.5px; }
  .calc-run-btn {
    width: 100%; padding: 11px 0; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid;
  }
</style>
</head>
<body>

<header id="app-header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#818cf8" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
      </div>
      <span class="logo-text">KPI Finder</span>
    </div>
    <div class="header-actions">
      <button id="compare-nav-btn" class="compare-nav-btn empty" data-action="open-compare">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 0v10" />
        </svg>
        Compare
        <span id="compare-nav-count" class="compare-count" style="display:none;"></span>
      </button>
      <button id="compare-clear-btn" class="compare-clear-btn" data-action="clear-compare" title="Clear all comparisons" style="display:none;">&#x2715;</button>
    </div>
  </div>
</header>

<div id="filter-section">
  <div class="filter-inner">
    <div>
      <h1 class="hero-title">Find the right KPI</h1>
      <p class="hero-sub">Browse by department &amp; focus area, or search by name</p>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" data-action="toggle-mode" data-mode="tags">Browse by Tags</button>
      <button class="mode-btn inactive" data-action="toggle-mode" data-mode="search">Search by Name</button>
    </div>

    <div id="search-section" style="display:none;width:100%;max-width:500px;">
      <div style="position:relative;">
        <svg class="search-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#64748b" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input id="search-input" type="text" placeholder="e.g. Revenue Growth, Churn Rate, NPS..." autocomplete="off" />
      </div>
    </div>

    <div id="tags-section" style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div style="text-align:center;">
        <p class="filter-group-label">Department</p>
        <div class="pills-row">
          <button id="all-btn" class="filter-pill active" data-action="set-all">
            <span class="dot" style="background:#818cf8;"></span> All
          </button>
          <div id="cat-pills" style="display:contents;"></div>
        </div>
      </div>

      <button class="focus-toggle-btn" data-action="toggle-focus-panel">
        <svg id="focus-arrow" class="focus-toggle-arrow" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
        <span id="focus-toggle-label">Show focus areas</span>
        <span id="focus-count-badge" class="focus-count-badge" style="display:none;"></span>
      </button>

      <div id="focus-tags-panel" style="display:none;text-align:center;">
        <p class="filter-group-label">Focus Area</p>
        <div class="pills-row" id="focus-tag-pills"></div>
      </div>

      <button id="clear-filters-btn" class="clear-filters-btn" data-action="clear-filters" style="display:none;"></button>
    </div>
  </div>
</div>

<div id="results-section"></div>

<div id="modal-detail" class="modal-overlay" style="display:none;"></div>
<div id="modal-compare" class="modal-overlay top-align" style="display:none;"></div>
<div id="modal-calc" class="modal-overlay" style="display:none;"></div>

<script>

  const KPI_DATA = [
  {
    "id": "1",
    "category": "Financial",
    "name": "Revenue Growth Rate",
    "type": "Core",
    "description": "% increase in revenue over a period",
    "variableTags": [
      "Sales Volume",
      "Price",
      "New Customers",
      "Market Expansion",
      "Product Mix",
      "Discounts",
      "Seasonality"
    ],
    "generalTags": [
      "Revenue",
      "Growth",
      "Pricing"
    ],
    "chartRecommendation": "Line Chart — tracks the trend of revenue changes period-over-period",
    "chartType": "Line Chart"
  },
  {
    "id": "2",
    "category": "Financial",
    "name": "Net Profit Margin",
    "type": "Core",
    "description": "Net income as a % of revenue",
    "variableTags": [
      "Revenue",
      "COGS",
      "Operating Costs",
      "Interest Expense",
      "Tax Rate",
      "Depreciation"
    ],
    "generalTags": [
      "Profitability",
      "Cost Management",
      "Revenue"
    ],
    "chartRecommendation": "Line Chart — monitors margin trend; overlay with a target reference line",
    "chartType": "Line Chart"
  },
  {
    "id": "3",
    "category": "Financial",
    "name": "Gross Profit Margin",
    "type": "Core",
    "description": "Revenue minus COGS, as a % of revenue",
    "variableTags": [
      "Revenue",

      return (ni / rev) * 100;

    unit: "%", precision: 2,
  },

  "92": {
    formula: "(Wishlist Items Purchased ÷ Total Wishlist Items Added) × 100",

  "93": {

    ],
    calculate: v => {

      return (failed / total) * 100;
    },

  "94": {
    formula: "(Number of Refunds ÷ Total Orders) × 100",
    inputs: [

  "95": {
    formula: "Mobile: (Mobile Conversions ÷ Mobile Visitors) × 100   |   Desktop: (Desktop Conversions ÷ Desktop Visitors) × 100",
    inputs: [
      { id: "mobileConv", label: "Mobile Conversions" },
      { id: "mobileVis", label: "Mobile Visitors" },
      { id: "desktopConv", label: "Desktop Conversions" },
      { id: "desktopVis", label: "Desktop Visitors" },

    calculate: v => {

      return `Mobile: ${mRate.toFixed(1)}%   |   Desktop: ${dRate.toFixed(1)}%`;
    },
    unit: "", precision: 1, multiResult: true,
  },

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function getFilteredKPIs() {
    let result = KPI_DATA;
    if (state.mode === 'tags') {
      if (state.showAll) return [...result].sort((a, b) => a.name.localeCompare(b.name));
      if (state.categories.length > 0)
        result = result.filter(k => state.categories.includes(k.category));
      if (state.tags.length > 0)
        result = result.filter(k => state.tags.every(t => k.generalTags.includes(t)));
      if (state.categories.length === 0 && state.tags.length === 0) return [];
    } else {
      const q = state.search.trim().toLowerCase();
      if (!q) return [];
      result = result.filter(k =>
        k.name.toLowerCase().includes(q) ||
        k.description.toLowerCase().includes(q) ||
        k.generalTags.some(t => t.toLowerCase().includes(q)) ||
        k.category.toLowerCase().includes(q)
      );
    }
    return [...result].sort((a, b) => a.name.localeCompare(b.name));
  }

  function formatNumber(n, precision) {
    const fixed = Math.abs(n).toFixed(precision);
    const parts = fixed.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return (n < 0 ? '-' : '') + parts.join('.');
  }

  function getChartExplainer(kpi) {
    const rec = kpi.chartRecommendation || '';
    return rec.split('\u2014')[1]?.trim() || rec.split('\u2013')[1]?.trim() || '';
  }

    const focusRow = items.map(kpi =>
      '<td class="compare-cell top"><div class="focus-tags">' +
      kpi.generalTags.map(tag => '<span class="focus-pill" style="cursor:default;">' + esc(tag) + '</span>').join('') +
      '</div></td>'
    ).join('');

    const varRow = items.map(kpi =>
      '<td class="compare-cell top last"><div class="focus-tags">' +
      kpi.variableTags.slice(0, 6).map(tag => '<span class="var-pill">' + esc(tag) + '</span>').join('') +
      (kpi.variableTags.length > 6 ? '<span style="font-size:12px;color:#334155;">+' + (kpi.variableTags.length - 6) + ' more</span>' : '') +
      '</div></td>'
    ).join('');

    overlay.innerHTML =
      '<div style="position:absolute;inset:0;" data-action="close-compare"></div>' +
      '<div class="modal-box compare-box" style="position:relative;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-bottom:1px solid rgba(51,65,85,0.35);">' +
      '<div><h2 style="font-size:18px;font-weight:700;color:#f1f5f9;">KPI Comparison</h2>' +
      '<p style="font-size:13px;color:#475569;margin-top:4px;">Comparing ' + items.length + ' KPI' + (items.length > 1 ? 's' : '') + ' side by side</p></div>' +
      '<button class="close-btn" data-action="close-compare">\u2715</button>' +
      '</div>' +
      '<div style="overflow-x:auto;">' +
      '<table class="compare-table">' +
      '<colgroup><col style="width:140px;">' + items.map(() => '<col>').join('') + '</colgroup>' +
      '<thead><tr><th class="compare-label-th"></th>' + headerCols + '</tr></thead>' +
      '<tbody>' +
      '<tr><td class="compare-label-td">Type</td>' + typeRow + '</tr>' +
      '<tr><td class="compare-label-td top">Description</td>' + descRow + '</tr>' +
      '<tr><td class="compare-label-td top">Best Chart</td>' + chartRow + '</tr>' +
      '<tr><td class="compare-label-td top">Focus Areas</td>' + focusRow + '</tr>' +
      '<tr><td class="compare-label-td top last">Key Variables</td>' + varRow + '</tr>' +
      '</tbody></table></div></div>';
  }

  // ── Render: Calculator modal ───────────────────────────────────────────────
  function renderCalcModal() {
    const overlay = document.getElementById('modal-calc');
    if (!state.calcKpi) { overlay.style.display = 'none'; return; }

    const kpi = state.calcKpi;
    const formula = KPI_FORMULAS[kpi.id];
    if (!formula) { overlay.style.display = 'none'; return; }

    const color = CAT_COLOR[kpi.category] || '#818cf8';
    overlay.style.display = 'flex';

    const inputsHtml = formula.inputs.map(input =>
      '<div>' +
      '<label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:5px;font-weight:500;">' + esc(input.label) + '</label>' +
      '<input type="number" class="calc-input" data-field="' + esc(input.id) + '" ' +
      'value="' + esc(state.calcValues[input.id] || '') + '" placeholder="Enter value..." ' +
      'style="border-color:rgba(71,85,105,0.5);">' +
      '</div>'
    ).join('');

    let resultHtml = '';
    if (state.calcError) {
      resultHtml = '<p class="calc-error">' + esc(state.calcError) + '</p>';
    } else if (state.calcResult !== null) {
      const display = typeof state.calcResult === 'string'
        ? state.calcResult
        : formatNumber(state.calcResult, formula.precision) + (formula.unit ? ' ' + formula.unit : '');
      const fontSize = typeof state.calcResult === 'string' ? '15px' : '30px';
      resultHtml =
        '<div class="calc-result-box" style="background:' + color + '20;border:1px solid ' + color + '66;">' +
        '<p class="section-label">Result</p>' +
        '<p class="calc-result-value" style="color:' + color + ';font-size:' + fontSize + ';">' + esc(display) + '</p>' +
        '</div>';
    }

    overlay.innerHTML =
      '<div style="position:absolute;inset:0;" data-action="close-calc"></div>' +
      '<div class="modal-box" style="max-width:480px;position:relative;">' +
      '<div class="modal-accent" style="background:' + color + ';"></div>' +
      '<div class="modal-header modal-header-compact">' +
      '<div><p class="section-label" style="margin:0 0 6px;">KPI Calculator</p>' +
      '<h2 class="modal-title" style="font-size:18px;">' + esc(kpi.name) + '</h2></div>' +
      '<button class="close-btn" data-action="close-calc">\u2715</button>' +
      '</div>' +
      '<div class="modal-divider"></div>' +
      '<div class="modal-body modal-body-compact">' +
      '<div class="formula-box" style="border-color:' + color + '55;">' +
      '<p class="section-label">Formula</p>' +
      '<p class="formula-text" style="color:' + color + ';">' + esc(formula.formula) + '</p>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:12px;">' + inputsHtml + '</div>' +
      resultHtml +
      '</div>' +
      '<div class="modal-footer modal-footer-compact">' +
      '<button class="calc-run-btn" data-action="run-calc" ' +
      'style="background:' + color + '33;border-color:' + color + '88;color:' + color + ';">Calculate</button>' +
      '</div></div>';

    // Re-attach focus/blur colour on inputs after re-render
    overlay.querySelectorAll('.calc-input').forEach(input => {
      input.addEventListener('focus', () => { input.style.borderColor = color + '90'; });
      input.addEventListener('blur', () => { input.style.borderColor = 'rgba(71,85,105,0.5)'; });
    });
  }

  // ── Full render ────────────────────────────────────────────────────────────
  function render() {
    renderHeader();
    renderFilters();
    renderResults();
    renderDetailModal();
    renderCompareModal();
    renderCalcModal();
  }

  // ── Run calculator ─────────────────────────────────────────────────────────
  function runCalc() {
    const formula = KPI_FORMULAS[state.calcKpi.id];
    if (!formula) return;
    const result = formula.calculate(state.calcValues);
    if (result === null) {
      state.calcError = 'Please fill in all fields with valid numbers.';
      state.calcResult = null;
    } else {
      state.calcResult = result;
      state.calcError = null;
    }
    renderCalcModal();
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  document.addEventListener('click', function(event) {
    const target = event.target.closest('[data-action]');
    if (!target) return;
    const action = target.dataset.action;

    if (action === 'toggle-mode') {
      state.mode = target.dataset.mode;
      render();

    } else if (action === 'set-all') {
      state.showAll = true; state.categories = []; state.tags = []; render();

    } else if (action === 'toggle-cat') {
      const cat = target.dataset.cat;
      state.showAll = false;
      state.categories = state.categories.includes(cat)
        ? state.categories.filter(c => c !== cat)
        : [...state.categories, cat];
      render();

    } else if (action === 'toggle-tag') {
      const tag = target.dataset.tag;
      state.showAll = false;
      state.tags = state.tags.includes(tag)
        ? state.tags.filter(t => t !== tag)
        : [...state.tags, tag];
      render();

    } else if (action === 'toggle-focus-panel') {
      state.showTagsPanel = !state.showTagsPanel; render();

    } else if (action === 'clear-filters') {
      state.categories = []; state.tags = []; render();

    } else if (action === 'clear-all') {
      if (state.mode === 'tags') { state.categories = []; state.tags = []; }
      else { state.search = ''; document.getElementById('search-input').value = ''; }
      render();

    } else if (action === 'select-kpi') {
      const kpi = KPI_DATA.find(k => k.id === target.dataset.id);
      if (kpi) { state.detailKpi = kpi; renderDetailModal(); }

    } else if (action === 'close-detail') {
      state.detailKpi = null; renderDetailModal();

    } else if (action === 'click-cat') {
      event.stopPropagation();
      const cat = target.dataset.cat;
      state.mode = 'tags'; state.showAll = false; state.detailKpi = null;
      if (!state.categories.includes(cat)) state.categories = [...state.categories, cat];
      render();

    } else if (action === 'click-tag') {
      event.stopPropagation();
      const tag = target.dataset.tag;
      state.mode = 'tags'; state.showAll = false; state.detailKpi = null;
      state.tags = state.tags.includes(tag)
        ? state.tags.filter(t => t !== tag)
        : [...state.tags, tag];
      render();

    } else if (action === 'toggle-compare') {
      event.stopPropagation();
      const id = target.dataset.id;
      const kpi = KPI_DATA.find(k => k.id === id);
      if (!kpi) return;
      const exists = state.compareList.find(k => k.id === id);
      if (exists) {
        state.compareList = state.compareList.filter(k => k.id !== id);
      } else if (state.compareList.length >= 3) {
        state.compareList = [...state.compareList.slice(1), kpi];
      } else {
        state.compareList = [...state.compareList, kpi];
      }
      if (state.detailKpi) state.detailKpi = null;
      render();

    } else if (action === 'open-compare') {
      if (state.compareList.length > 0) { state.showCompare = true; renderCompareModal(); }

    } else if (action === 'close-compare') {
      state.showCompare = false; renderCompareModal();

    } else if (action === 'clear-compare') {
      state.compareList = []; render();

    } else if (action === 'remove-compare') {
      state.compareList = state.compareList.filter(k => k.id !== target.dataset.id);
      if (state.compareList.length === 0) state.showCompare = false;
      render();

    } else if (action === 'open-calc') {
      event.stopPropagation();
      const kpi = KPI_DATA.find(k => k.id === target.dataset.id);
      if (!kpi) return;
      state.calcKpi = kpi; state.calcValues = {}; state.calcResult = null;
      state.calcError = null; state.detailKpi = null;
      render();

    } else if (action === 'close-calc') {
      state.calcKpi = null; state.calcResult = null; state.calcError = null;
      renderCalcModal();

    } else if (action === 'run-calc') {
      runCalc();
    }
  });

  document.addEventListener('input', function(event) {
    if (event.target.id === 'search-input') {
      state.search = event.target.value;
      renderResults();
    } else if (event.target.classList.contains('calc-input')) {
      state.calcValues[event.target.dataset.field] = event.target.value;
      state.calcResult = null;
      state.calcError = null;
    }
  });

  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
      if (state.calcKpi) { state.calcKpi = null; renderCalcModal(); }
      else if (state.detailKpi) { state.detailKpi = null; renderDetailModal(); }
      else if (state.showCompare) { state.showCompare = false; renderCompareModal(); }
    }
    if (event.key === 'Enter' && state.calcKpi) runCalc();
  });

  render();

</script>
</body>
</html>
